<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SipStrong Hero Demo</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Oswald:wght@500;700;900&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Hero Section -->
    <section class="hero" id="hero">
        <!-- Background Elements -->
        <div class="hero-bg"></div>
        <div class="hero-grid"></div>

        <div class="hero-container">
            <!-- Text Content -->
            <div class="hero-content">
                <div class="tagline reveal-text">
                    <span class="tag-line-inner">Next-Gen Nutrition</span>
                </div>

                <h1 class="hero-title">
                    <div class="title-line reveal-text">
                        <span class="title-inner">FUEL YOUR</span>
                    </div>
                    <div class="title-line reveal-text">
                        <span class="title-inner highlight">STRENGTH</span>
                    </div>
                    <div class="title-line reveal-text">
                        <span class="title-inner">ANYWHERE.</span>
                    </div>
                </h1>

                <p class="hero-subtitle reveal-fade">
                    A portable protein pouch delivering 25g protein whenever your body needs it. Zero fillers. Zero
                    compromises.
                </p>

                <div class="hero-actions reveal-fade">
                    <button class="btn btn-primary">
                        <span class="btn-text">Shop Now</span>
                        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                    <button class="btn btn-outline">
                        <span class="btn-text">Learn More</span>
                    </button>
                </div>
            </div>

            <!-- Product Visual -->
            <div class="hero-visual reveal-scale">
                <div class="product-wrapper floating">
                    <!-- Placeholder for the actual 3D product image -->
                    <div class="product-pouch outline-glow">
                        <div class="pouch-logo">S</div>
                        <div class="pouch-label">25g PROTEIN</div>
                    </div>
                    <!-- Shadow that pulses with the float animation -->
                    <div class="product-shadow pulsing-shadow"></div>
                </div>
            </div>
        </div>

        <!-- Scroll Hint -->
        <div class="scroll-hint reveal-fade-late">
            <span class="scroll-text">Discover</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
