<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SipStrong Product Showcase</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Oswald:wght@500;700;900&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Spacer to allow scrolling to the showcase -->
    <header class="spacer-header">
        <h1>Scroll Down to Reveal</h1>
    </header>

    <!-- Product Showcase Section -->
    <section class="showcase" id="showcase">
        <div class="showcase-container">
            <div class="showcase-header reveal-item">
                <h2 class="showcase-title">THE ARSENAL</h2>
                <p class="showcase-subtitle">Precision-engineered protein pouches for unrelenting performance.</p>
            </div>

            <div class="product-grid">
                <!-- Product Card 1 -->
                <div class="product-card reveal-card">
                    <div class="card-image-wrapper">
                        <!-- CSS Mock of the Pouch -->
                        <div class="mock-pouch pouch-chocolate">
                            <span class="p-logo">S</span>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="card-meta">
                            <span class="protein-tag">25g PROTEIN</span>
                        </div>
                        <h3 class="product-name">Double Chocolate</h3>
                        <p class="product-price">$34.99</p>
                        <button class="buy-btn">Add to Cart</button>
                    </div>
                </div>

                <!-- Product Card 2 -->
                <div class="product-card reveal-card">
                    <div class="card-image-wrapper">
                        <div class="mock-pouch pouch-vanilla">
                            <span class="p-logo">S</span>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="card-meta">
                            <span class="protein-tag">25g PROTEIN</span>
                        </div>
                        <h3 class="product-name">Vanilla Bean</h3>
                        <p class="product-price">$34.99</p>
                        <button class="buy-btn">Add to Cart</button>
                    </div>
                </div>

                <!-- Product Card 3 -->
                <div class="product-card reveal-card">
                    <div class="card-image-wrapper">
                        <div class="mock-pouch pouch-strawberry">
                            <span class="p-logo">S</span>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="card-meta">
                            <span class="protein-tag">25g PROTEIN</span>
                        </div>
                        <h3 class="product-name">Strawberry Smash</h3>
                        <p class="product-price">$34.99</p>
                        <button class="buy-btn">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Spacer to allow scrolling past -->
    <footer class="spacer-footer"></footer>

    <script src="script.js"></script>
</body>

</html>
